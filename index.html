    <title>Aesthetic Calculator</title>

  <body>
    <script>
      function divide() {
        let a = 9000;
        let b = 90;

        if (b == 0) {
          console.log("Cannot divide by zero");
        } else {
          let result = a / b;
          console.log("Quotient = " + result);
        }
      }

      divide();
    </script>
